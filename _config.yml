# Site
locale                   : "en-US"
title                    : "Anirban Chakraborty"
title_separator          : "-"
name                     : &name "Anirban Chakraborty"
description              : &description "Postdoctoral Researcher at MPI-SP and Visiting Researcher at RUB, working on hardware and microarchitecture security."
url                      : "https://anirbanc3.github.io"
baseurl                  : ""
repository               : "anirbanc3/anirbanc3.github.io"


# Author / sidebar
author:
  avatar           : "profile.png"
  name             : "Anirban Chakraborty"
  pronouns         : "he/him"
  bio              : "Postdoctoral Researcher at MPI-SP and Visiting Researcher at RUB"
  location         : "Bochum, Germany"
  employer         : "MPI-SP, Bochum"
  email            : "anirban.chakraborty@mpi-sp.org"

  # Academic
  googlescholar    : "https://scholar.google.com/citations?user=QzcCWLMAAAAJ&hl=en"
  orcid            : "https://orcid.org/0000-0001-7411-7509"

  # Code
  github           : "anirbanc3"

  # Social
  linkedin         : "anirban-chakraborty-b20926aa"
  twitter          : "@anirban727"


# Site settings
breadcrumbs              : false
words_per_minute         : 200
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false
atom_feed:
  path                   :


# Analytics (set tracking_id to enable)
analytics:
  provider               : false
  google:
    tracking_id          :


# Reading files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown
kramdown:
  math_engine: mathjax
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Collections
collections: {}


# Defaults
defaults:
  - scope:
      path: "_pages/about.md"
    values:
      layout: single
      permalink: /
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Output
permalink: /
timezone: CET


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# HTML compression
compress_html:
  clippings: all
  ignore:
    envs: development
